
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Introduction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: #333;
        }

        .info {
            font-size: 18px;
            margin: 15px 0;
            color: #555;
        }

        .interests {
            margin-top: 20px;
        }

        .tag {
            display: inline-block;
            background: #4facfe;
            color: white;
            padding: 8px 12px;
            margin: 5px;
            border-radius: 20px;
            font-size: 14px;
        }

        footer {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hello, I'm Ayush Gond 👋</h1>
    
    <div class="info">
        🎓 College: GEC Samastipur
    </div>

    <div class="info">
        💡 Interests:
    </div>

    <div class="interests">
        <span class="tag">Web Development</span>
        <span class="tag">Coding</span>
        <span class="tag">Technology</span>
        <span class="tag">Learning New Skills</span>
    </div>

    <footer>
        © 2026 My Personal Page
    </footer>
</div>

</body>
</html>
